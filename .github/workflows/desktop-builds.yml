name: Desktop Builds

on:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon release artifact
            os: macos-14
            target: aarch64-apple-darwin
            artifact_name: tiny-retro-racer-macos-arm64
            binary_name: tiny-retro-racer
          - name: macOS Intel release artifact
            os: macos-13
            target: x86_64-apple-darwin
            artifact_name: tiny-retro-racer-macos-x64
            binary_name: tiny-retro-racer
          - name: Windows release artifact
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: tiny-retro-racer-windows-x64
            binary_name: tiny-retro-racer.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install target
        shell: bash
        run: rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        shell: bash
        run: cargo build --release --bin tiny-retro-racer --target ${{ matrix.target }}

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.target }}" == *apple-darwin ]]; then
            scripts/package-macos-app.sh "${{ matrix.target }}" "${{ matrix.artifact_name }}" "${{ matrix.binary_name }}"
          else
            mkdir -p "dist/${{ matrix.artifact_name }}"
            cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.artifact_name }}/"
            cp assets/app-icon.ico "dist/${{ matrix.artifact_name }}/"
            cp README.md CHANGELOG.md "dist/${{ matrix.artifact_name }}/"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          if-no-files-found: error
